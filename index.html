<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe vs MrBeast Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <div id="info">Izmanto peli vai pirkstu, lai kustētos pa kreisi un pa labi.</div>
        <div id="scoreboard">
            <span>Pepe skaits: <strong id="pepe-count">1</strong></span>
            <span>MrBeast skaits: <strong id="beast-count">40</strong></span>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div id="overlay" class="hidden">
        <h1 id="overlay-text">Zaudēji!</h1>
        <button onclick="location.reload()">Spēlēt vēlreiz</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
