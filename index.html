<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe vs MrBeast Runner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <div id="language-selector">
            <button id="lang-lv" class="lang-btn active" onclick="changeLanguage('lv')">LV</button>
            <button id="lang-en" class="lang-btn" onclick="changeLanguage('en')">EN</button>
            <button id="lang-ru" class="lang-btn" onclick="changeLanguage('ru')">RU</button>
        </div>

        <div id="ui-container">
            <div id="info">Izmanto peli vai pirkstu, lai kustētos pa kreisi un pa labi.</div>
            <div id="scoreboard">
                <span id="pepe-label">Pepe skaits: <strong id="pepe-count">1</strong></span>
                <span id="beast-label">MrBeast skaits: <strong id="beast-count">40</strong></span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="overlay" class="hidden">
            <div class="overlay-card">
                <h1 id="overlay-text">Zaudēji!</h1>
                <div id="button-container"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
